<!doctype html>
<!-- Source for public/og-image.png (1200x630 Open Graph card).
     Regenerate: open at exactly 1200x630 and screenshot, or replace
     public/og-image.png with real artwork. -->
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; box-sizing: border-box; }
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(160deg, #1c6b41 0%, #2d8451 55%, #36995f 100%);
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 90px;
        position: relative;
      }
      /* faint yard lines */
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to right,
          transparent 0 118px,
          rgba(255, 255, 255, 0.08) 118px 121px
        );
      }
      .left { position: relative; max-width: 680px; }
      h1 {
        font-size: 92px;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.02;
        margin-bottom: 26px;
      }
      h1 .dash { color: #ffd166; }
      p {
        font-size: 31px;
        font-weight: 500;
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.92);
        margin-bottom: 34px;
      }
      .grid { font-size: 28px; white-space: nowrap; }
      .card {
        position: relative;
        background: #f3f4f6;
        color: #1f2330;
        border-radius: 22px;
        padding: 38px 44px;
        width: 330px;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
        text-align: center;
      }
      .card .label {
        font-size: 19px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #6b7280;
      }
      .card .record {
        font-size: 88px;
        font-weight: 800;
        letter-spacing: -0.03em;
        line-height: 1.15;
        white-space: nowrap;
      }
      .card .tier {
        font-size: 24px;
        white-space: nowrap;
        font-weight: 700;
        color: #1f9d6a;
        margin-bottom: 22px;
      }
      .card .score {
        display: inline-block;
        background: #eaf1fd;
        color: #3b6fe0;
        border-radius: 14px;
        padding: 12px 26px;
        font-size: 34px;
        font-weight: 800;
      }
      .card .score em {
        font-style: normal;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: #6b7280;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="left">
      <h1>The 20<span class="dash">–</span>0 Game</h1>
      <p>Draft an all-time NFL roster team-by-team. Simulate the season. Chase perfection.</p>
      <div class="grid">🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩&nbsp;|&nbsp;🏆🏆🏆</div>
    </div>
    <div class="card">
      <div class="label">Final</div>
      <div class="record">20–0</div>
      <div class="tier">Perfect. Immortal. 🐐</div>
      <div class="score">100<em>Score</em></div>
    </div>
  </body>
</html>
