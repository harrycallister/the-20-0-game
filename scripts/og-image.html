<!doctype html>
<!-- Source for public/og-image.png (1200x630 Open Graph card), vintage
     program theme matching src/index.css. Regenerate: open at exactly
     1200x630 and screenshot. -->
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Graduate&display=swap"
    />
    <style>
      * { margin: 0; box-sizing: border-box; }
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: #f0e9d6;
        background-image: radial-gradient(
          ellipse at 20% 10%,
          rgba(255, 255, 255, 0.5) 0%,
          transparent 55%
        );
        color: #232323;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 90px;
        position: relative;
      }
      /* vintage double rules top + bottom */
      body::before,
      body::after {
        content: '';
        position: absolute;
        left: 60px;
        right: 60px;
        border-top: 5px solid #232323;
        box-shadow: 0 7px 0 -5px #232323;
      }
      body::before { top: 36px; }
      body::after { bottom: 44px; }
      .left { max-width: 660px; }
      h1 {
        font-family: 'Graduate', 'Arial Black', sans-serif;
        font-size: 84px;
        font-weight: 400;
        letter-spacing: 0.01em;
        line-height: 1.05;
        margin-bottom: 22px;
      }
      h1 .dash { color: #c1432e; }
      p {
        font-size: 29px;
        font-weight: 600;
        line-height: 1.4;
        color: #6f6a58;
        margin-bottom: 30px;
      }
      .grid { font-size: 27px; white-space: nowrap; }
      .card {
        background: #faf5e6;
        border: 4px solid #232323;
        border-radius: 18px;
        box-shadow: 10px 10px 0 #232323;
        padding: 38px 44px;
        width: 330px;
        text-align: center;
      }
      .card .label {
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: #c1432e;
      }
      .card .record {
        font-family: 'Graduate', 'Arial Black', sans-serif;
        font-size: 92px;
        line-height: 1.15;
        white-space: nowrap;
      }
      .card .tier {
        font-family: 'Graduate', 'Arial Black', sans-serif;
        font-size: 21px;
        white-space: nowrap;
        color: #1f6f43;
        margin-bottom: 22px;
      }
      .card .score {
        display: inline-block;
        background: #f7e9c4;
        border: 3px solid #232323;
        border-radius: 12px;
        padding: 10px 26px;
        font-family: 'Graduate', 'Arial Black', sans-serif;
        font-size: 34px;
      }
      .card .score em {
        font-style: normal;
        font-family: system-ui, sans-serif;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.14em;
        color: #6f6a58;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="left">
      <h1>The 20<span class="dash">–</span>0 Game</h1>
      <p>Draft an all-time NFL roster team-by-team. Simulate the season. Chase perfection.</p>
      <div class="grid">🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩🟩&nbsp;|&nbsp;🏆🏆🏆</div>
    </div>
    <div class="card">
      <div class="label">Final</div>
      <div class="record">20–0</div>
      <div class="tier">Perfect. Immortal. 🐐</div>
      <div class="score">100<em>SCORE</em></div>
    </div>
  </body>
</html>
