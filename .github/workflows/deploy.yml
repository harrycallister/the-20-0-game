name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      # --- Custom domain (one-line change when ready) ---------------------
      # Once you buy a domain:
      #   1. Change VITE_SITE_URL in .env to https://yourdomain.com
      #   2. Uncomment the line below with your domain (this keeps the
      #      custom-domain setting from being wiped on each deploy)
      #   3. In repo Settings -> Pages, set the same custom domain
      #   4. DNS: CNAME www -> harrycallister.github.io (or A records
      #      185.199.108-111.153 for the apex)
      # - run: echo "yourdomain.com" > dist/CNAME
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
